# Fly.io deployment config for Kniffel Tracker.
# Fly builds the Docker image from the repo's Dockerfile and deploys it with a
# persistent Fly Volume for the SQLite database.
#
# Before first deploy:
#   1. Create the app:     fly apps create yahtzee
#   2. Create the volume:  fly volumes create kniffel_data --region ams --size 1
#   3. Set secrets:        fly secrets set SECRET_KEY=<...> ALLOWED_HOSTS=<...>
#   4. Deploy:            fly deploy
#
# IMPORTANT: this app uses SQLite on a single Fly Volume. SQLite cannot
# handle multiple concurrent writers, so you MUST keep the app scaled to
# exactly one Machine. After the first deploy, run:
#   fly scale count 1
# Creating more than one Machine or volume will risk database corruption.

app = "yahtzee"
primary_region = "ams"
console_command = "/app/manage.py shell"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/app/data/db.sqlite3"
  DEBUG = "False"
  PORT = "8000"
  PYTHONDONTWRITEBYTECODE = "1"
  PYTHONUNBUFFERED = "1"

[[mounts]]
  source = "kniffel_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"


