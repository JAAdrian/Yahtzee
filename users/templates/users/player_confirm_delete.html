{% extends "base.html" %}

{% block title %}Spieler löschen - Kniffel Tracker{% endblock %}

{% block content %}
<div class="card">
    <h2>Spieler löschen</h2>
    <p>Soll <strong>{{ player.name }}</strong> wirklich gelöscht werden?</p>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button type="submit" class="btn btn-danger">Löschen</button>
            <a href="{% url 'player_list' %}" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
