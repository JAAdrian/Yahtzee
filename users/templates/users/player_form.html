{% extends "base.html" %}

{% block title %}{% if player %}Spieler bearbeiten{% else %}Neuer Spieler{% endif %} - Kniffel Tracker{% endblock %}

{% block content %}
<div class="card">
    <h2>{% if player %}'{{ player.name }}' bearbeiten{% else %}Neuer Spieler{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{ player.name|default:'' }}" required>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-success">Speichern</button>
            <a href="{% url 'player_list' %}" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
