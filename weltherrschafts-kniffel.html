<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Kniffel (Yahtzee) Score</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #666;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #f4f4f4;
    }

    input[type="number"] {
      width: 50px;
    }

    select {
      width: 110px;
    }

    button {
      margin: 5px;
      padding: 6px 12px;
    }

    /* Summe- und Bonus-Zellen */
    .sum-cell,
    .bonus-cell {
      font-weight: bold;
      background: #e8f0fe;
    }

    .bonus-achieved {
      color: green;
    }

    .bonus-missed {
      color: red;
    }
  </style>
</head>

<body>

  <h1>Kniffel (Yahtzee) Score Sheet</h1>
  <button id="addPlayerBtn">Neuen Spieler hinzufügen</button>
  <button id="resetAllBtn">Spieler + Werte zurücksetzen</button>
  <button id="resetBtn">Alle Werte zurücksetzen</button>

  <table id="scoreTable">
    <thead>
      <tr>
        <th>Kategorie</th>
      </tr>
    </thead>
    <tbody></tbody>
    <tfoot>
      <tr>
        <th>Gesamtsumme</th>
      </tr>
    </tfoot>
  </table>

  <script>
    const STORAGE_KEY = 'kniffelState';
    let isDirty = false;

    function markDirty() { isDirty = true; saveState(); }

    window.addEventListener('beforeunload', e => {
      if (!isDirty) return;
      e.preventDefault();
      e.returnValue = '';
    });

    const categories = [
      'Einser', 'Zweier', 'Dreier', 'Vierer', 'Fünfer', 'Sechser',
      'Summe Oben', 'Dreierpasch', 'Viererpasch', 'Full House',
      'Kleine Straße', 'Große Straße', 'Kniffel', 'Chance'
    ];
    const specialInfo = {
      'Full House': { idx: 9, points: 25 },
      'Kleine Straße': { idx: 10, points: 30 },
      'Große Straße': { idx: 11, points: 40 },
      'Kniffel': { idx: 12, points: 50 }
    };

    const table = document.getElementById('scoreTable');
    const theadRow = table.tHead.rows[0];
    const tbody = table.tBodies[0];
    const tfootRow = table.tFoot.rows[0];
    let playerCount = 0;

    /* -------- Tabellenaufbau -------- */
    function initTable() {
      theadRow.innerHTML = '<th>Kategorie</th>';
      tfootRow.innerHTML = '<th>Gesamtsumme</th>';
      tbody.innerHTML = '';
      playerCount = 0;
      buildRows();
    }

    function buildRows() {
      categories.forEach(cat => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<th>${cat}</th>`;
        tbody.appendChild(tr);

        if (cat === 'Summe Oben') {                    // Bonus-Zeile
          const bonusTr = document.createElement('tr');
          bonusTr.innerHTML = '<th>Bonus (≥63 → +35)</th>';
          tbody.appendChild(bonusTr);
        }
      });

      /* neue Zeile für Summe Unten */
      const lowerSumTr = document.createElement('tr');
      lowerSumTr.innerHTML = '<th>Summe Unten</th>';
      tbody.appendChild(lowerSumTr);
    }

    /* -------- Zelle erzeugen -------- */
    function createCell(catIdx, playerIdx, saved) {
      const td = document.createElement('td');

      // Summe Oben / Summe Unten
      if (catIdx === 6 || catIdx === 'lower') {
        td.className = 'sum-cell';
        td.textContent = saved != null ? saved : '0';
        return td;
      }

      // Bonus-Zeile wird nicht via createCell erzeugt
      if (catIdx === null) return td;

      const info = Object.values(specialInfo)
        .find(o => o.idx === catIdx);

      if (info) { // Spezial-Kategorien über Dropdown
        const sel = document.createElement('select');
        // erstes Option-Element ist jetzt wieder wählbar
        sel.innerHTML = `
          <option value="">— Auswählen —</option>
          <option value="Gewürfelt">Gewürfelt</option>
          <option value="Gestrichen">Gestrichen</option>`;
        sel.value = saved || '';
        sel.addEventListener('change', () => { recalcColumn(playerIdx); markDirty(); });
        td.appendChild(sel);

      } else {  // normale Kategorien über Input-Feld
        const inp = document.createElement('input');
        inp.type = 'number';
        inp.min = 0;
        inp.value = saved != null ? saved : '';
        inp.addEventListener('input', () => { recalcColumn(playerIdx); markDirty(); });
        td.appendChild(inp);
      }

      return td;
    }


    /* -------- Spieler hinzufügen -------- */
    document.getElementById('addPlayerBtn')
      .addEventListener('click', () => {
        const name = prompt('Name des neuen Spielers:');
        if (!name) return;
        addPlayer(name);
        markDirty();
      });

    function addPlayer(name, savedValues) {
      const th = document.createElement('th');
      th.textContent = name;
      theadRow.appendChild(th);

      const totalRows = tbody.rows.length;
      for (let r = 0; r < totalRows; r++) {
        const header = tbody.rows[r].cells[0].textContent;

        if (header.startsWith('Bonus')) {            // Bonus-Zeile
          const bonusTd = document.createElement('td');
          bonusTd.className = 'bonus-cell';
          bonusTd.textContent = savedValues ? savedValues[r] : '0';
          tbody.rows[r].appendChild(bonusTd);
          continue;
        }

        if (header === 'Summe Oben') {               // Summe Oben
          const td = createCell(6, playerCount, savedValues ? savedValues[r] : null);
          tbody.rows[r].appendChild(td);
          continue;
        }

        if (header === 'Summe Unten') {              // Summe Unten
          const td = createCell('lower', playerCount, savedValues ? savedValues[r] : null);
          tbody.rows[r].appendChild(td);
          continue;
        }

        const catIdx = categories.indexOf(header);   // normale Kategorien
        const saved = savedValues ? savedValues[r] : null;
        tbody.rows[r].appendChild(createCell(catIdx, playerCount, saved));
      }

      /* Fußzeile */
      const sumTd = document.createElement('td');
      sumTd.className = 'sum-cell';
      sumTd.textContent = '0';
      tfootRow.appendChild(sumTd);

      playerCount++;
      recalcAll();
    }

    /* -------- Berechnungen -------- */
    function recalcColumn(idx) {
      let sumOben = 0, bonus = 0, lowerSum = 0;

      // Einser–Sechser
      for (let r = 0; r < 6; r++) {
        const inp = tbody.rows[r].cells[idx + 1].querySelector('input');
        sumOben += parseInt(inp.value) || 0;
      }
      tbody.rows[6].cells[idx + 1].textContent = sumOben;   // Summe Oben

      // Bonus
      const bonusCell = tbody.rows[7].cells[idx + 1];
      if (sumOben >= 63) {
        bonusCell.textContent = '35';
        bonusCell.classList.add('bonus-achieved');
        bonusCell.classList.remove('bonus-missed');
      } else {
        bonusCell.textContent = '0';
        bonusCell.classList.add('bonus-missed');
        bonusCell.classList.remove('bonus-achieved');
      }
      bonus = parseInt(bonusCell.textContent);

      // Unterer Teil (ab Dreierpasch bis Chance)
      for (let r = 8; r < tbody.rows.length; r++) {
        const header = tbody.rows[r].cells[0].textContent;
        if (header === 'Summe Unten') break;         // Stop vor Summenzeile

        const cell = tbody.rows[r].cells[idx + 1];
        const info = specialInfo[header];
        let points = 0;

        if (info) {
          const sel = cell.querySelector('select');
          if (sel.value === 'Gewürfelt') points = info.points;
        } else {
          const inp = cell.querySelector('input');
          points = parseInt(inp.value) || 0;
        }
        lowerSum += points;
      }

      // Summe Unten-Zelle schreiben
      const lowerSumRow = Array.from(tbody.rows)
        .find(r => r.cells[0].textContent === 'Summe Unten');
      lowerSumRow.cells[idx + 1].textContent = lowerSum;

      // Gesamtsumme
      tfootRow.cells[idx + 1].textContent = sumOben + bonus + lowerSum;
    }

    function recalcAll() { for (let i = 0; i < playerCount; i++) recalcColumn(i); }

    /* -------- Zurücksetzen -------- */
    document.getElementById('resetBtn')
      .addEventListener('click', () => {
        if (!confirm('Alle Werte wirklich zurücksetzen?')) return;
        clearValues();
        saveState();
        isDirty = false;
      });

    document.getElementById('resetAllBtn')
      .addEventListener('click', () => {
        if (!confirm('Alle Spieler UND Werte wirklich löschen?')) return;
        localStorage.removeItem(STORAGE_KEY);
        initTable();
        isDirty = false;
      });

    function clearValues() {
      for (let c = 1; c <= playerCount; c++) {
        for (let r = 0; r < tbody.rows.length; r++) {
          const header = tbody.rows[r].cells[0].textContent;
          const cell = tbody.rows[r].cells[c];

          if (header === 'Summe Oben' || header.startsWith('Bonus') || header === 'Summe Unten') {
            cell.textContent = '0';
            continue;
          }

          const sel = cell.querySelector('select');
          if (sel) sel.value = '';
          else {
            const inp = cell.querySelector('input');
            inp.value = '';
          }
        }
        tfootRow.cells[c].textContent = '0';
      }
      recalcAll();
      markDirty();
    }

    /* -------- LocalStorage -------- */
    function saveState() {
      const state = { players: [] };
      for (let c = 1; c <= playerCount; c++) {
        state.players.push({ name: theadRow.cells[c].textContent, values: [] });
      }

      for (let r = 0; r < tbody.rows.length; r++) {
        for (let c = 1; c <= playerCount; c++) {
          const header = tbody.rows[r].cells[0].textContent;
          const cell = tbody.rows[r].cells[c];

          if (header === 'Summe Oben' || header.startsWith('Bonus') || header === 'Summe Unten') {
            state.players[c - 1].values.push(cell.textContent);
          } else {
            const sel = cell.querySelector('select');
            if (sel) state.players[c - 1].values.push(sel.value || '');
            else {
              const inp = cell.querySelector('input');
              state.players[c - 1].values.push(inp.value || '');
            }
          }
        }
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const state = JSON.parse(raw);
      initTable();
      state.players.forEach(pl => addPlayer(pl.name, pl.values));
      isDirty = false;
      return true;
    }

    /* -------- Start -------- */
    if (!loadState()) initTable();
  </script>
</body>

</html>
